<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LO Test Site — Rich Text</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css"/>
</head>
<body>
  <script src="shared.js"></script>

  <main class="page-wrap">
    <div class="page-header">
      <span class="page-emoji">✏️</span>
      <div>
        <h1>Rich Text Editor</h1>
        <p>Quill.js — <code style="font-size:.8rem;background:#eef2ee;border:1px solid #d0ddd0;border-radius:4px;padding:.1rem .35rem;color:var(--green)">contenteditable</code> with nested spans and continuous DOM mutations while typing.</p>
      </div>
    </div>

    <div id="quill-editor">
      <p>The <strong>fiddle leaf fig</strong> does not forgive. It does not forget. It simply <em>drops leaves</em> until you understand what you've done.</p>
    </div>
  </main>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>
    new Quill('#quill-editor', { theme: 'snow' })
  </script>
</body>
</html>
